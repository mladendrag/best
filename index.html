<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfólio — Fundamentos</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --border:#334155; --green:#22c55e; --red:#ef4444; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; }
  h1 { margin: 0 0 0.25rem; }
  .sub { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.85rem; }
  .wrap { max-width: 1300px; margin: 0 auto; }
  .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--muted); }
  select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.95rem; min-width: 180px; }
  .card { background: var(--card); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
  .card h2 { margin: 0 0 1rem; font-size: 1.05rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  th, td { padding: 0.4rem 0.5rem; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--card); font-weight: 600; z-index: 1; }
  thead th { color: var(--muted); font-weight: 600; background: var(--card); position: sticky; top: 0; }
  .scroll { overflow-x: auto; max-width: 100%; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .title-row { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
  .price { font-size: 1.1rem; color: var(--muted); }
  .loading { color: var(--muted); text-align: center; padding: 2rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Portfólio — Fundamentos</h1>
  <div class="sub" id="meta">Carregando…</div>

  <div class="controls">
    <label>Ativo <select id="ticker"></select></label>
  </div>

  <div id="content" class="loading">Carregando dados…</div>
</div>

<script>
let DATA = null;

async function init() {
  const res = await fetch('./data.json');
  DATA = await res.json();

  const tickers = Object.keys(DATA.tickers).sort();
  document.getElementById('meta').textContent =
    `Atualizado em ${new Date(DATA.generatedAt).toLocaleString('pt-BR')} · ${tickers.length} ativos`;

  const sel = document.getElementById('ticker');
  tickers.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => render(sel.value));
  sel.value = tickers[0];
  render(tickers[0]);
}

function render(ticker) {
  const d = DATA.tickers[ticker];
  if (!d) return;
  const content = document.getElementById('content');
  content.className = '';
  content.innerHTML = `
    <div class="card">
      <h2>${ticker}${d.info.name ? ' — ' + d.info.name : ''}</h2>
    </div>

    <div class="card">
      <h2>Histórico Completo de Indicadores</h2>
      <div class="scroll"><table id="indTable"></table></div>
    </div>

    <div class="card">
      <h2>DRE Anual Completa</h2>
      <div class="scroll"><table id="dreTable"></table></div>
    </div>

    <div class="card">
      <h2>DRE Consolidada Anual (ativosPassivos, R$ bi)</h2>
      <div class="scroll"><table id="apTable"></table></div>
    </div>

    <div class="card">
      <h2>Balanço Patrimonial Trimestral (R$ bi)</h2>
      <div class="scroll"><table id="bpTable"></table></div>
    </div>

    <div class="card">
      <h2>Receita Trimestral (R$ bi)</h2>
      <div class="scroll"><table id="rqTable"></table></div>
    </div>
  `;

  renderIndTable(d);
  renderDRETable(d);
  renderAPTable(d);
  renderBPTable(d);
  renderRQTable(d);
}

function renderDRETable(d) {
  const dre = d.dreAnual;
  const t = document.getElementById('dreTable');
  if (!dre) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  const { years, rows } = dre;
  const metricRows = Object.entries(rows);
  t.innerHTML = `
    <thead><tr><th>Métrica</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${metricRows.map(([name, arr]) => `
      <tr><td>${name}</td>${arr.map(v => formatCell(v, name)).join('')}</tr>`).join('')}
    </tbody>`;
}

function formatCell(v, metricName = '') {
  if (v == null) return '<td>-</td>';
  const isPct = /Margem|ROE|ROIC/i.test(metricName);
  const display = isPct ? `${v.toFixed(2)}%` : (Math.abs(v) >= 1e6 ? (v/1e9).toFixed(2) : v.toFixed(2));
  const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : '';
  return `<td class="${cls}">${display}</td>`;
}

function renderAPTable(d) {
  const ap = d.ativosPassivos;
  const t = document.getElementById('apTable');
  if (!Array.isArray(ap) || ap.length === 0) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  const fields = ['net_revenue','cost','gross_profit','ebitda','ebit','tax','net_profit','net_worth'];
  const labels = {net_revenue:'Receita Líquida',cost:'Custo',gross_profit:'Lucro Bruto',ebitda:'EBITDA',ebit:'EBIT',tax:'Imposto',net_profit:'Lucro Líquido',net_worth:'Patrimônio Líquido'};
  const years = ap.map(r => r.year);
  t.innerHTML = `
    <thead><tr><th>Métrica</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${fields.map(f => `
      <tr><td>${labels[f]}</td>${ap.map(r => {
        const v = r[f];
        if (v == null || v === 0) return '<td>-</td>';
        return `<td class="${v>0?'pos':'neg'}">${(v/1e9).toFixed(2)}</td>`;
      }).join('')}</tr>`).join('')}
    </tbody>`;
}

function renderBPTable(d) {
  const bp = d.balancoPatrimonial;
  const t = document.getElementById('bpTable');
  if (!bp || !bp.years || bp.years.length === 0) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  const { years, rows } = bp;
  const metricRows = Object.entries(rows);
  t.innerHTML = `
    <thead><tr><th>Métrica</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${metricRows.map(([name, arr]) => `
      <tr><td>${name}</td>${arr.map(v => {
        if (v == null) return '<td>-</td>';
        return `<td class="${v>0?'pos':'neg'}">${(v/1e9).toFixed(2)}</td>`;
      }).join('')}</tr>`).join('')}
    </tbody>`;
}

function renderRQTable(d) {
  const rq = d.receitaQuarterly;
  const t = document.getElementById('rqTable');
  if (!Array.isArray(rq) || rq.length === 0) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  t.innerHTML = `
    <thead><tr><th>Período</th><th>Receita</th><th>Custo</th><th>Lucro</th></tr></thead>
    <tbody>${rq.map(r => `
      <tr>
        <td>${r.quarter === 0 || r.quarter === '0' ? r.year : `${r.quarter}T${r.year}`}</td>
        <td>${r.net_revenue ? (r.net_revenue/1e9).toFixed(2) : '-'}</td>
        <td>${r.cost ? (r.cost/1e9).toFixed(2) : '-'}</td>
        <td class="${r.net_profit>0?'pos':'neg'}">${r.net_profit ? (r.net_profit/1e9).toFixed(2) : '-'}</td>
      </tr>`).join('')}
    </tbody>`;
}

function renderIndTable(d) {
  const inds = d.indicators || {};
  const names = Object.keys(inds);
  const t = document.getElementById('indTable');
  if (names.length === 0) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  const years = (inds[names[0]] || []).map(s => s.year);
  t.innerHTML = `
    <thead><tr><th>Indicador</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${names.map(name => {
      const series = inds[name];
      const map = Object.fromEntries(series.map(s => [s.year, s.value]));
      return `<tr><td>${name}</td>${years.map(y => {
        const v = map[y];
        const n = typeof v === 'number' ? v.toFixed(2) : '-';
        return `<td>${n}</td>`;
      }).join('')}</tr>`;
    }).join('')}</tbody>`;
}

init();
</script>
</body>
</html>
