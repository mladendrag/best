<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfólio — Fundamentos</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --border:#334155; --blue:#3b82f6; --green:#22c55e; --red:#ef4444; --amber:#f59e0b; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; }
  h1 { margin: 0 0 0.25rem; }
  .sub { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.85rem; }
  .wrap { max-width: 1300px; margin: 0 auto; }
  .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--muted); }
  select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.95rem; min-width: 180px; }
  .card { background: var(--card); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
  .card h2 { margin: 0 0 1rem; font-size: 1.05rem; }
  canvas { background: var(--bg); border-radius: 8px; padding: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  th, td { padding: 0.4rem 0.5rem; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--card); font-weight: 600; z-index: 1; }
  thead th { color: var(--muted); font-weight: 600; background: var(--card); position: sticky; top: 0; }
  .scroll { overflow-x: auto; max-width: 100%; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .title-row { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
  .price { font-size: 1.1rem; color: var(--muted); }
  .loading { color: var(--muted); text-align: center; padding: 2rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Portfólio — Fundamentos</h1>
  <div class="sub" id="meta">Carregando…</div>

  <div class="controls">
    <label>Ativo <select id="ticker"></select></label>
    <label>Indicador <select id="indicator"></select></label>
  </div>

  <div id="content" class="loading">Carregando dados…</div>
</div>

<script>
let DATA = null;
const charts = {};

const fmtBi = (v) => v == null ? '-' : `R$ ${(v/1e9).toFixed(2)} bi`;
const fmtPct = (v) => v == null ? '-' : `${v.toFixed(2)}%`;

async function init() {
  const res = await fetch('./data.json');
  DATA = await res.json();

  const tickers = Object.keys(DATA.tickers).sort();
  document.getElementById('meta').textContent =
    `Atualizado em ${new Date(DATA.generatedAt).toLocaleString('pt-BR')} · ${tickers.length} ativos`;

  const sel = document.getElementById('ticker');
  tickers.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => render(sel.value));
  document.getElementById('indicator').addEventListener('change', () => renderIndicator(sel.value));

  sel.value = tickers[0];
  render(tickers[0]);
}

function destroyCharts() {
  Object.values(charts).forEach(c => c?.destroy());
}

function render(ticker) {
  const d = DATA.tickers[ticker];
  if (!d) return;

  // indicators select
  const indSel = document.getElementById('indicator');
  const indicators = Object.keys(d.indicators || {});
  const prev = indSel.value;
  indSel.innerHTML = '';
  indicators.forEach(name => {
    const o = document.createElement('option');
    o.value = name; o.textContent = name;
    indSel.appendChild(o);
  });
  indSel.value = indicators.includes(prev) ? prev : indicators[0];

  destroyCharts();
  const content = document.getElementById('content');
  content.className = '';
  content.innerHTML = `
    <div class="card">
      <div class="title-row">
        <h2>${ticker} — ${d.info.name || ''}</h2>
        ${d.info.price ? `<div class="price">R$ ${d.info.price.toFixed(2)}</div>` : ''}
      </div>
    </div>

    <div class="card">
      <h2>Receita × Lucro Anual (R$ bi)</h2>
      <canvas id="chartDRE" height="110"></canvas>
    </div>

    <div class="card">
      <h2 id="indTitle">Histórico de Indicador</h2>
      <canvas id="chartInd" height="110"></canvas>
    </div>

    <div class="card">
      <h2>Receita × Lucro Trimestral (R$ bi)</h2>
      <canvas id="chartQuarterly" height="110"></canvas>
    </div>

    <div class="card">
      <h2>DRE Anual Completa</h2>
      <div class="scroll"><table id="dreTable"></table></div>
    </div>

    <div class="card">
      <h2>DRE Consolidada (endpoint ativosPassivos)</h2>
      <div class="scroll"><table id="apTable"></table></div>
    </div>

    <div class="card">
      <h2>Balanço Patrimonial Trimestral</h2>
      <div class="scroll"><table id="bpTable"></table></div>
    </div>

    <div class="card">
      <h2>Receita Trimestral (endpoint receitaliquida)</h2>
      <div class="scroll"><table id="rqTable"></table></div>
    </div>

    <div class="card">
      <h2>Histórico Completo de Indicadores</h2>
      <div class="scroll"><table id="indTable"></table></div>
    </div>
  `;

  renderDREChart(d);
  renderIndicator(ticker);
  renderQuarterlyChart(d);
  renderDRETable(d);
  renderAPTable(d);
  renderBPTable(d);
  renderRQTable(d);
  renderIndTable(d);
}

function renderDREChart(d) {
  const dre = d.dreAnual;
  if (!dre) return;
  const years = dre.years;
  const receita = (dre.rows['Receita Líquida'] || []).map(v => v ? v/1e9 : null);
  const lucro = (dre.rows['Lucro Líquido'] || []).map(v => v ? v/1e9 : null);

  charts.dre = new Chart(document.getElementById('chartDRE'), {
    data: {
      labels: years,
      datasets: [
        { type: 'bar', label: 'Receita Líquida', data: receita, backgroundColor: '#3b82f6', borderRadius: 4, order: 2 },
        { type: 'line', label: 'Lucro Líquido', data: lucro, borderColor: '#22c55e', backgroundColor: '#22c55e', borderWidth: 3, tension: 0.3, pointRadius: 5, order: 1 },
      ],
    },
    options: chartOpts('R$ ', ' bi'),
  });
}

function renderIndicator(ticker) {
  const d = DATA.tickers[ticker];
  const name = document.getElementById('indicator').value;
  if (!name || !d.indicators?.[name]) return;
  const series = d.indicators[name];
  const labels = series.map(s => s.year);
  const values = series.map(s => typeof s.value === 'number' ? s.value : null);

  document.getElementById('indTitle').textContent = `Histórico: ${name}`;

  if (charts.ind) charts.ind.destroy();
  charts.ind = new Chart(document.getElementById('chartInd'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: name, data: values,
        borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.15)',
        borderWidth: 3, tension: 0.3, pointRadius: 5, fill: true,
      }],
    },
    options: chartOpts(),
  });
}

function renderQuarterlyChart(d) {
  const rq = d.receitaQuarterly;
  if (!Array.isArray(rq) || rq.length === 0) return;
  // filtrar ÚLT 12M e quarter 0
  const rows = rq.filter(r => r.year && /^\d{4}$/.test(String(r.year)) && r.quarter && r.quarter !== 0 && r.quarter !== '0');
  const labels = rows.map(r => `${r.quarter}T${r.year}`);
  const receita = rows.map(r => r.net_revenue ? r.net_revenue/1e9 : null);
  const lucro = rows.map(r => r.net_profit ? r.net_profit/1e9 : null);

  charts.quarterly = new Chart(document.getElementById('chartQuarterly'), {
    data: {
      labels,
      datasets: [
        { type: 'bar', label: 'Receita', data: receita, backgroundColor: '#3b82f6', borderRadius: 4, order: 2 },
        { type: 'line', label: 'Lucro', data: lucro, borderColor: '#22c55e', borderWidth: 2, tension: 0.3, pointRadius: 3, order: 1 },
      ],
    },
    options: chartOpts('R$ ', ' bi'),
  });
}

function renderDRETable(d) {
  const dre = d.dreAnual;
  if (!dre) return;
  const t = document.getElementById('dreTable');
  const { years, rows } = dre;
  const metricRows = Object.entries(rows);
  t.innerHTML = `
    <thead><tr><th>Métrica</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${metricRows.map(([name, arr]) => `
      <tr><td>${name}</td>${arr.map(v => formatCell(v, name)).join('')}</tr>`).join('')}
    </tbody>`;
}

function formatCell(v, metricName = '') {
  if (v == null) return '<td>-</td>';
  const isPct = /Margem|ROE|ROIC/i.test(metricName);
  const display = isPct ? `${v.toFixed(2)}%` : (Math.abs(v) >= 1e6 ? (v/1e9).toFixed(2) : v.toFixed(2));
  const cls = v > 0 ? 'pos' : v < 0 ? 'neg' : '';
  return `<td class="${cls}">${display}</td>`;
}

function renderAPTable(d) {
  const ap = d.ativosPassivos;
  const t = document.getElementById('apTable');
  if (!Array.isArray(ap) || ap.length === 0) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  const fields = ['net_revenue','cost','gross_profit','ebitda','ebit','tax','net_profit','net_worth'];
  const labels = {net_revenue:'Receita Líquida',cost:'Custo',gross_profit:'Lucro Bruto',ebitda:'EBITDA',ebit:'EBIT',tax:'Imposto',net_profit:'Lucro Líquido',net_worth:'Patrimônio Líquido'};
  const years = ap.map(r => r.year);
  t.innerHTML = `
    <thead><tr><th>Métrica (R$ bi)</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${fields.map(f => `
      <tr><td>${labels[f]}</td>${ap.map(r => {
        const v = r[f];
        if (v == null || v === 0) return '<td>-</td>';
        return `<td class="${v>0?'pos':'neg'}">${(v/1e9).toFixed(2)}</td>`;
      }).join('')}</tr>`).join('')}
    </tbody>`;
}

function renderBPTable(d) {
  const bp = d.balancoPatrimonial;
  const t = document.getElementById('bpTable');
  if (!bp || !bp.years || bp.years.length === 0) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  const { years, rows } = bp;
  const metricRows = Object.entries(rows);
  t.innerHTML = `
    <thead><tr><th>Métrica (R$ bi)</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${metricRows.map(([name, arr]) => `
      <tr><td>${name}</td>${arr.map(v => {
        if (v == null) return '<td>-</td>';
        return `<td class="${v>0?'pos':'neg'}">${(v/1e9).toFixed(2)}</td>`;
      }).join('')}</tr>`).join('')}
    </tbody>`;
}

function renderRQTable(d) {
  const rq = d.receitaQuarterly;
  const t = document.getElementById('rqTable');
  if (!Array.isArray(rq) || rq.length === 0) { t.innerHTML = '<tr><td>Sem dados</td></tr>'; return; }
  t.innerHTML = `
    <thead><tr><th>Período</th><th>Receita (R$ bi)</th><th>Custo (R$ bi)</th><th>Lucro (R$ bi)</th></tr></thead>
    <tbody>${rq.map(r => `
      <tr>
        <td>${r.quarter === 0 || r.quarter === '0' ? r.year : `${r.quarter}T${r.year}`}</td>
        <td>${r.net_revenue ? (r.net_revenue/1e9).toFixed(2) : '-'}</td>
        <td>${r.cost ? (r.cost/1e9).toFixed(2) : '-'}</td>
        <td class="${r.net_profit>0?'pos':'neg'}">${r.net_profit ? (r.net_profit/1e9).toFixed(2) : '-'}</td>
      </tr>`).join('')}
    </tbody>`;
}

function renderIndTable(d) {
  const inds = d.indicators || {};
  const names = Object.keys(inds);
  if (names.length === 0) return;
  const years = (inds[names[0]] || []).map(s => s.year);
  const t = document.getElementById('indTable');
  t.innerHTML = `
    <thead><tr><th>Indicador</th>${years.map(y => `<th>${y}</th>`).join('')}</tr></thead>
    <tbody>${names.map(name => {
      const series = inds[name];
      const map = Object.fromEntries(series.map(s => [s.year, s.value]));
      return `<tr><td>${name}</td>${years.map(y => {
        const v = map[y];
        const n = typeof v === 'number' ? v.toFixed(2) : '-';
        return `<td>${n}</td>`;
      }).join('')}</tr>`;
    }).join('')}</tbody>`;
}

function chartOpts(prefix='', suffix='') {
  return {
    responsive: true,
    plugins: {
      legend: { labels: { color: '#e2e8f0' } },
      tooltip: { callbacks: { label: c => `${c.dataset.label}: ${prefix}${(c.raw ?? 0).toFixed(2)}${suffix}` } },
    },
    scales: {
      x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
      y: { ticks: { color: '#94a3b8', callback: v => `${prefix}${v}${suffix}` }, grid: { color: '#334155' } },
    },
  };
}

init();
</script>
</body>
</html>
